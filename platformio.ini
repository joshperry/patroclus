; PlatformIO Configuration for Patroclus
; VE.CAN Energy Meter Reader for Victron GX
;
; One codebase, multiple physical boards. The generic firmware lives in
; lib/PatroclusRuntime and is always compiled; each board is a thin "app" under
; src/apps/<name>/ that composes its virtual meters and drives the runtime. The build
; env selects which app compiles (build_src_filter), so `pio run -e <app>` builds that
; board's firmware:
;
;   split_phase  -> patroclus01  (split-phase transfer-switch input, grid meter)
;   inverter     -> patroclus02  (inverter input + output meters)
;
; Each app also has an *_ota env that uploads over HTTP to that board's hostname.

[platformio]
default_envs = split_phase

[env]
platform = espressif32
framework = arduino
board = seeed_xiao_esp32s3
monitor_speed = 115200
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0.0
    GxProjectorClient=https://github.com/nuketownada/gx-projector-client.git#v0.1.0

; Common build flags. -I include puts the project include/ (patroclus_config.h,
; secrets.h) on the path for the runtime library too (lib/ builds don't get it by
; default).
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -I include

; Compile the runtime library + shared src, but exclude every app; each env below
; re-adds exactly one so only that board's setup()/loop() is linked.
build_src_filter = +<*> -<apps/>

; ============================================================================
; split_phase (patroclus01) - USB flash + OTA
; ============================================================================
[env:split_phase]
build_src_filter = ${env.build_src_filter} +<apps/split_phase/>
upload_speed = 921600
; patroclus01 is physically wired to the XIAO's TX/RX header pins (GPIO43/44), the
; original tap. Keep it there; newer boards use the D0/D1 default (see config note).
build_flags = ${env.build_flags} -DCAN_TX_PIN=GPIO_NUM_43 -DCAN_RX_PIN=GPIO_NUM_44

[env:split_phase_ota]
extends = env:split_phase
upload_protocol = custom
upload_command = curl --fail --show-error --progress-bar -X POST -F "firmware=@$SOURCE" http://patroclus01.local:8080/update

; ============================================================================
; inverter (patroclus02) - USB flash + OTA
; ============================================================================
[env:inverter]
build_src_filter = ${env.build_src_filter} +<apps/inverter/>
upload_speed = 921600

[env:inverter_ota]
extends = env:inverter
upload_protocol = custom
upload_command = curl --fail --show-error --progress-bar -X POST -F "firmware=@$SOURCE" http://patroclus02.local:8080/update
