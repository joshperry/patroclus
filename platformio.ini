; PlatformIO Configuration for Patroclus
; VE.CAN Energy Meter Reader for Victron GX

[platformio]
default_envs = xiao_esp32s3

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
lib_deps = 
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0.0

; Common build flags
build_flags = 
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; ============================================================================
; USB Upload (default) - for initial flash or when device is local
; ============================================================================
[env:xiao_esp32s3]
board = seeed_xiao_esp32s3
upload_speed = 921600

; ============================================================================
; HTTP OTA Upload - for remote updates
; Usage: pio run -e ota -t upload
; ============================================================================
[env:ota]
board = seeed_xiao_esp32s3

; Custom upload via HTTP POST
upload_protocol = custom
upload_command = curl --fail --show-error --progress-bar -X POST -F "firmware=@$SOURCE" http://patroclus01.local:8080/update
